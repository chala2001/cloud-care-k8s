apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: dev
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8004
          env:
            - name: LOCAL_DEV
              value: "true"             # logs emails to console instead of sending via SES
            - name: SES_FROM_ADDRESS
              value: "noreply@cloudcare.local"
            - name: AWS_DEFAULT_REGION
              value: "ap-south-1"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: dev
spec:
  selector:
    app: notification-service
  ports:
    - port: 8004
      targetPort: 8004
  type: ClusterIP