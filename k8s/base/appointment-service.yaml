apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: appointment-service-db-secret
                  key: DATABASE_URL
            - name: DB_SCHEMA
              value: "appointments"
            - name: PATIENT_SERVICE_URL
              value: "http://patient-service:8001"   # cluster DNS
            - name: AUDIT_SERVICE_URL
              value: "http://audit-service:8003"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: dev
spec:
  selector:
    app: appointment-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: appointment-service-db-secret
  namespace: dev
type: Opaque
stringData:
  DATABASE_URL: "postgresql://appt_svc:appt_pass@postgres:5432/cloudcare"