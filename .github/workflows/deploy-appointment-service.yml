name: Deploy appointment-service

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "services/appointment-service/**"
      - ".github/workflows/deploy-appointment-service.yml"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cloudcare-k8s-appointment-service
  SERVICE_DIR: services/appointment-service
  HELM_CHART: helm/appointment-service
  HELM_RELEASE: appointment-service

jobs:

  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::670794226080:role/cloudcare-k8s-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY:$TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest \
            $SERVICE_DIR
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev'

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::670794226080:role/cloudcare-k8s-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name cloudcare-k8s --region $AWS_REGION

      - name: Deploy to dev namespace
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
          REGISTRY: 670794226080.dkr.ecr.ap-south-1.amazonaws.com
        run: |
          helm upgrade --install $HELM_RELEASE $HELM_CHART \
            --namespace dev \
            --create-namespace \
            -f $HELM_CHART/values-dev.yaml \
            --set image.repository=$REGISTRY/$ECR_REPOSITORY \
            --set image.tag=$TAG \
            --set image.pullPolicy=Always

      - name: Verify dev deploy
        run: kubectl get pods -n dev -l app=$HELM_RELEASE || true

  deploy-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::670794226080:role/cloudcare-k8s-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name cloudcare-k8s --region $AWS_REGION

      - name: Deploy to prod namespace
        env:
          TAG: ${{ needs.build.outputs.image_tag }}
          REGISTRY: 670794226080.dkr.ecr.ap-south-1.amazonaws.com
        run: |
          helm upgrade --install $HELM_RELEASE $HELM_CHART \
            --namespace prod \
            --create-namespace \
            -f $HELM_CHART/values-prod.yaml \
            --set image.repository=$REGISTRY/$ECR_REPOSITORY \
            --set image.tag=$TAG \
            --wait --timeout 5m

      - name: Verify prod deploy
        run: |
          kubectl rollout status deployment/$HELM_RELEASE -n prod
          kubectl get pods -n prod -l app=$HELM_RELEASE
