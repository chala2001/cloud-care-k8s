replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8003                 # audit-service listens on 8003

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

healthCheck:
  path: /health
  port: 8003
  initialDelaySeconds: 5
  periodSeconds: 10

env:
  DYNAMODB_TABLE: "audit_events"
  AWS_DEFAULT_REGION: "ap-south-1"
  LOG_LEVEL: "INFO"

# DynamoDB Local for dev — leave empty for prod (uses real AWS DynamoDB via IRSA)
dynamodbEndpointUrl: ""

# Fake AWS credentials for DynamoDB Local in dev — prod uses IRSA (no keys needed)
awsAccessKeyId: ""
awsSecretAccessKey: ""

serviceAccount:
  roleArn: ""    # set in values-prod.yaml to the IRSA role ARN

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
