replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8002                 # appointment-service listens on 8002

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

healthCheck:
  path: /health
  port: 8002
  initialDelaySeconds: 5
  periodSeconds: 10

env:
  DB_SCHEMA: "appointments"
  LOG_LEVEL: "INFO"
  PATIENT_SERVICE_URL: "http://patient-service:8001"       # sync call to verify patient exists
  AUDIT_SERVICE_URL: "http://audit-service:8003"           # async fire-and-forget
  NOTIFICATION_SERVICE_URL: "http://notification-service:8004"  # async fire-and-forget

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

externalSecret:
  enabled: false
  secretStoreRef:
    name: aws-secrets-store
    kind: ClusterSecretStore
  refreshInterval: "1h"
  remoteSecretName: ""

databaseUrl: ""
